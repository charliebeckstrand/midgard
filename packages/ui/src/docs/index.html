<!doctype html>
<html lang="en" class="h-full antialiased">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
		<title>UI Components</title>
		<!-- Fonts load via CSS @font-face with font-display: swap — no preload needed.
		     The flex font is 4 MB; preloading it competes with JS for bandwidth. -->
	</head>
	<body class="h-full bg-zinc-100 dark:bg-zinc-900 text-zinc-950 dark:text-white">
		<div id="root" class="h-full"></div>
		<script>
			const t = localStorage.getItem('theme')

			if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
				document.documentElement.classList.add('dark')
			}
		</script>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
