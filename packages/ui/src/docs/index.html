<!doctype html>
<html lang="en" class="h-full antialiased">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
		<title>UI Components</title>
		<link rel="preload" href="./fonts/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf" as="font" type="font/ttf" crossorigin />
		<link rel="preload" href="./fonts/GoogleSansCode-VariableFont_wght.ttf" as="font" type="font/ttf" crossorigin />
	</head>
	<body class="h-full bg-zinc-100 dark:bg-zinc-900">
		<div id="root" class="h-full"></div>
		<script>
			const t = localStorage.getItem('theme')

			if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
				document.documentElement.classList.add('dark')
			}
		</script>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
