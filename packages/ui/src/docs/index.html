<!doctype html>
<html lang="en" class="h-full antialiased">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
		<title>Docs</title>
		<!-- Fonts load via CSS @font-face with font-display: swap — no preload needed. -->
	</head>
	<body class="h-full bg-zinc-100 dark:bg-zinc-900 text-zinc-950 dark:text-white">
		<div id="root" class="h-full"></div>
		<script>
			// Pre-hydration theme paint. Must resolve the stored preference the
			// same way `useTheme`'s `readStoredMode` does, or a dark-OS visitor
			// flashes light on every load until React's post-paint effect corrects
			// it. The hook treats anything but an explicit 'light'/'dark' — 'system',
			// absent, or a stale/corrupt value — as follow-the-OS, so mirror that:
			// go dark for 'dark', or for any non-'light' value when the OS is dark.
			// Storage access can throw (blocked cookies, embedded contexts); fall
			// back to the OS preference rather than letting the script abort.
			let t = null

			try {
				t = localStorage.getItem('theme')
			} catch {}

			const systemDark = matchMedia('(prefers-color-scheme: dark)').matches

			if (t === 'dark' || (t !== 'light' && systemDark)) {
				document.documentElement.classList.add('dark')
			}
		</script>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
