pre-commit:
  jobs:
    - name: biome check
      run: pnpm biome check
      priority: 1
    - name: check-types
      run: pnpm check-types
      priority: 2
    - name: test
      run: pnpm turbo run test --filter=ui
      priority: 3
    - name: knip
      run: pnpm turbo run knip
      priority: 4

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
