pre-commit:
  parallel: true
  jobs:
    - name: biome check
      run: pnpm biome check --staged --no-errors-on-unmatched
    - name: ui related tests
      root: packages/ui/
      glob: '**/*.{ts,tsx}'
      run: pnpm test:related --passWithNoTests {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: biome check
      run: pnpm biome check .
    - name: full gate
      run: pnpm turbo run check-types test knip

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
