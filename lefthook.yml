pre-commit:
  parallel: true
  jobs:
    - name: biome check
      run: pnpm biome check --staged --no-errors-on-unmatched
    - name: ui related tests
      root: packages/ui/
      glob: '**/*.{ts,tsx}'
      run: pnpm test:related --passWithNoTests {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: biome check
      run: pnpm biome check .
    # test:changed scopes Vitest to the merge-base diff, so this gate's cost
    # tracks the push, not the suite; CI runs the full gate and gates merges.
    - name: branch gate
      run: pnpm turbo run check-types test:changed --affected
    - name: knip
      run: pnpm turbo run knip

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
