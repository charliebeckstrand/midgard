# The ui browser suite (vitest.browser.config.ts: the `browser` and
# `floating-ui` instances) verifies layout/colour geometry and real
# floating-engine focus behaviour that jsdom can't. The Lefthook pre-commit
# gate runs only the jsdom suite, so without this workflow the browser tests
# have no automated gate at all.
name: browser-tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: browser-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter ui exec playwright install chromium --with-deps

      - name: Run browser suite
        run: pnpm --filter ui test:browser
